services:
  neo4j:
    image: neo4j:5-community
    container_name: doc-analysis-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - ${DATA_PATH}/neo4j/data:/data
      - ${DATA_PATH}/neo4j/logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER} -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: doc-analysis-qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC (optional)
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    volumes:
      - ${DATA_PATH}/qdrant:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5


  neo4j-init:
    image: neo4j:5-community
    container_name: doc-analysis-neo4j-init
    depends_on:
      neo4j:
        condition: service_healthy
    entrypoint: >
      cypher-shell -u ${NEO4J_USER} -p ${NEO4J_PASSWORD}
      -a bolt://neo4j:7687
      -f /schema.cypher
    volumes:
      - ./Database/schema.cypher:/schema.cypher
    restart: "no"

networks:
  default:
    name: doc-analysis-network
